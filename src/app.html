<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    
    <!-- PWA -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="ManHau" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="ManHau" />
    <meta name="msapplication-TileColor" content="#6366f1" />
    <meta name="msapplication-config" content="none" />
    
    <!-- SEO -->
    <meta name="description" content="ManHau - Lee manga, manhwa y comics online gratis. Soporte offline con PWA. Miles de títulos actualizados diariamente." />
    <meta name="keywords" content="manga, manhwa, comics, leer online, gratis, offline, PWA, anime" />
    <meta name="author" content="ManHau" />
    <meta name="robots" content="index, follow" />
    <meta name="language" content="Spanish" />
    <meta name="revisit-after" content="1 day" />
    
    <!-- OpenGraph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://manhau.app" />
    <meta property="og:title" content="ManHau - Lector de Manga Online" />
    <meta property="og:description" content="Lee manga, manhwa y comics online gratis. Soporte offline con PWA." />
    <meta property="og:image" content="https://manhau.app/og-image.png" />
    <meta property="og:site_name" content="ManHau" />
    <meta property="og:locale" content="es_ES" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://manhau.app" />
    <meta name="twitter:title" content="ManHau - Lector de Manga Online" />
    <meta name="twitter:description" content="Lee manga, manhwa y comics online gratis. Soporte offline con PWA." />
    <meta name="twitter:image" content="https://manhau.app/og-image.png" />
    
    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://mangadex.org" crossorigin />
    
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
